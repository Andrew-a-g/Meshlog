version: '3.8'
services:
  web:
    build: .
    ports:
      - "8083:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    environment:
      - MESHLOG_DB_HOST=db
      - MESHLOG_DB_NAME=meshlog
      - MESHLOG_DB_USER=meshuser
      - MESHLOG_DB_PASS=meshpass

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=meshlog
      - MYSQL_USER=meshuser
      - MYSQL_PASSWORD=meshpass
      - MYSQL_ROOT_PASSWORD=rootpass
    volumes:
      - db_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro

  phpMyAdmin:                                                                                                                                                       
    depends_on:                                                                                                                                                     
      - db                                                                                                                                                    
    image: phpmyadmin                                                                                                                                               
    restart: unless-stopped                                                                                                                                         
    ports:                                                                                                                                                          
      - "8091:80"                                                                                                                                                   
    environment:                                                                                                                                                    
     PMA_HOST: db                                                                                                                                            
     MYSQL_ROOT_PASSWORD: rootpass  

volumes:
  db_data:
